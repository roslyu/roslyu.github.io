<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rosali Su · Front Door</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #faf9f6;
      color: #2c3e2f;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .door {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
      padding: 2.5rem 2rem;
      text-align: center;
      border: 1px solid #e9e5da;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #2c5e2a;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.2rem;
      color: #6b7c5e;
      margin-bottom: 2rem;
      border-bottom: 2px solid #e2d9cd;
      display: inline-block;
      padding-bottom: 0.3rem;
    }

    .intro {
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 2rem auto;
      color: #3e4a3a;
    }

    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      margin: 2rem 0 1.5rem;
    }

    .door-button {
      display: inline-block;
      padding: 0.9rem 2.2rem;
      font-size: 1.2rem;
      font-weight: 500;
      text-decoration: none;
      border-radius: 60px;
      transition: all 0.2s ease;
      background: white;
      border: 1.5px solid #cbdbb8;
      color: #2c5e2a;
      min-width: 200px;
    }

    .door-button:hover {
      background: #eef4e8;
      transform: translateY(-3px);
      border-color: #9bba8e;
    }

    hr {
      margin: 2rem 0;
      border: none;
      height: 1px;
      background: #e9e5da;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 1.8rem;
      flex-wrap: wrap;
      font-size: 0.9rem;
    }

    .footer-links a {
      color: #8a9a7a;
      text-decoration: none;
    }

    .footer-links a:hover {
      color: #2c5e2a;
      text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="door">
  <h1>Rosali Su</h1>
  <div class="tagline">CPA · creator · curious mind</div>
  <div class="intro">
    Welcome to my corner of the web. <br>
    Two doors — same person, different rooms.
  </div>

  <div class="button-group">
    <a href="professional.html" class="door-button">📁 Professional →</a>
    <a href="personal.html" class="door-button">🌿 Personal & projects →</a>
  </div>

  <hr>

  <div class="footer-links">
    <a href="https://linkedin.com/in/rosali-su" target="_blank">LinkedIn</a>
    <a href="#">Resume (PDF)</a>
    <a href="#">Contact</a>
  </div>
  <div style="margin-top: 1rem; font-size: 0.75rem; color: #b9c4ae;">
    ✻
  </div>
</div>
</body>
</html>
